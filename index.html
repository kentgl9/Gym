<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Nippard 4x Tracker</title><!-- v1.4 -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#242424; --bg4:#2e2e2e;
  --text:#f0f0f0; --text2:#909090; --text3:#555;
  --accent:#e8ff47; --green:#3ddc84; --orange:#ffaa44; --red:#ff5f5f;
  --border:#2a2a2a; --r:13px; --r-sm:8px;
}
html,body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  font-size:15px; max-width:430px; margin:0 auto;
  min-height:100vh; padding-bottom:140px;
}
.nav {
  position:fixed; bottom:0; left:0; right:0;
  width:100%; max-width:430px; margin:0 auto;
  background:#121212; border-top:0.5px solid var(--border);
  display:flex; justify-content:space-around;
  padding:10px 0; padding-bottom:max(18px,env(safe-area-inset-bottom));
  z-index:9999;
}
.nav-btn { background:none; border:none; color:var(--text3); font-size:10px; font-weight:600; letter-spacing:0.3px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; padding:2px 12px; }
.nav-btn.active { color:var(--accent); }
.nav-icon { font-size:20px; }
.screen { display:none; padding:20px 16px; padding-bottom:140px; }
.screen.active { display:block; }
h1 { font-size:26px; font-weight:700; letter-spacing:-0.8px; }
.section-label { font-size:11px; font-weight:700; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin:20px 0 8px; }
.card { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; }
.week-bar { display:flex; align-items:center; gap:10px; background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r-sm); padding:12px 14px; margin-bottom:18px; }
.week-bar label { font-size:13px; color:var(--text2); white-space:nowrap; }
input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
.week-val { font-size:17px; font-weight:700; color:var(--accent); min-width:22px; text-align:right; }
.s-card { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center; gap:12px; }
.s-card:active { background:var(--bg3); }
.s-card.done { border-color:#1d3d1d; }
.s-icon { font-size:28px; width:44px; text-align:center; flex-shrink:0; }
.s-info { flex:1; }
.s-name { font-size:16px; font-weight:600; }
.s-sub { font-size:12px; color:var(--text2); margin-top:2px; }
.s-done { font-size:11px; color:var(--green); margin-top:4px; font-weight:600; }
.s-arrow { font-size:18px; color:var(--text3); }
.tag { display:inline-block; font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; letter-spacing:0.4px; }
.tag-accent { background:var(--accent); color:#000; }
.tag-orange { background:#3a2200; color:var(--orange); }
.back-btn { background:none; border:none; color:var(--accent); font-size:15px; font-weight:600; cursor:pointer; padding:0 0 18px; display:flex; align-items:center; gap:4px; }
.ex-card { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r); margin-bottom:12px; overflow:hidden; }
.ex-header { padding:14px 14px 10px; display:flex; justify-content:space-between; align-items:flex-start; }
.ex-name { font-size:15px; font-weight:600; flex:1; }
.ex-load-val { font-size:20px; font-weight:700; color:var(--accent); }
.ex-load-unit { font-size:11px; color:var(--text3); text-align:right; }
.ex-meta { padding:0 14px 10px; font-size:12px; color:var(--text2); display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.ex-note { padding:6px 14px; background:rgba(255,170,68,0.08); font-size:11px; color:var(--orange); border-top:0.5px solid rgba(255,170,68,0.15); }
.rpe { font-size:11px; font-weight:700; padding:2px 7px; border-radius:5px; }
.rpe-lo { background:#0a2a15; color:#3ddc84; }
.rpe-md { background:#2a1e00; color:#ffcc44; }
.rpe-hi { background:#2a0e0e; color:#ff8844; }
.sets-wrapper { padding:0 14px 14px; }
.set-header { display:grid; grid-template-columns:28px 1fr 1fr 1fr 40px; gap:5px; margin-bottom:6px; }
.set-header span { font-size:10px; color:var(--text3); text-align:center; font-weight:600; letter-spacing:0.3px; }
.set-row { display:grid; grid-template-columns:28px 1fr 1fr 1fr 40px; gap:5px; margin-bottom:6px; align-items:center; }
.set-n { font-size:12px; color:var(--text3); text-align:center; background:var(--bg4); border-radius:6px; padding:10px 4px; font-weight:600; }
.set-inp { background:var(--bg4); border:0.5px solid var(--border); color:var(--text); border-radius:7px; padding:10px 4px; font-size:15px; text-align:center; width:100%; -webkit-appearance:none; outline:none; font-family:inherit; }
.set-inp:focus { border-color:var(--accent); }
.set-inp::placeholder { color:var(--text3); font-size:12px; }
.set-chk { background:var(--bg4); border:0.5px solid var(--border); border-radius:7px; padding:10px 6px; cursor:pointer; font-size:16px; text-align:center; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.set-chk.done { background:var(--green); border-color:var(--green); }
.complete-btn { display:block; width:100%; background:var(--accent); color:#000; font-size:16px; font-weight:700; border:none; border-radius:var(--r); padding:16px; cursor:pointer; margin-top:16px; }
.complete-btn:active { opacity:0.85; }
.stat-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.stat-box { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r-sm); padding:14px; }
.stat-label { font-size:11px; color:var(--text2); margin-bottom:5px; }
.stat-val { font-size:24px; font-weight:700; }
.stat-unit { font-size:13px; font-weight:400; color:var(--text2); }
.rm-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:0.5px solid var(--border); }
.rm-row:last-child { border-bottom:none; }
.rm-inp { background:var(--bg3); border:0.5px solid var(--border); color:var(--text); border-radius:var(--r-sm); padding:8px 10px; font-size:16px; font-weight:700; width:90px; text-align:center; outline:none; font-family:inherit; }
.rm-inp:focus { border-color:var(--accent); }
.empty { text-align:center; padding:40px 20px; color:var(--text2); }
.empty-icon { font-size:44px; margin-bottom:12px; }

/* CALENDAR */
.cal-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.cal-nav button { background:var(--bg3); border:0.5px solid var(--border); color:var(--text); border-radius:var(--r-sm); padding:8px 14px; cursor:pointer; font-size:16px; }
.cal-month { font-size:18px; font-weight:700; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day-label { font-size:10px; color:var(--text3); text-align:center; font-weight:700; padding:4px 0; }
.cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:50%; font-size:13px; position:relative; }
.cal-day.other { color:var(--text3); }
.cal-day.today { color:var(--accent); font-weight:700; }
.cal-day.trained { background:var(--accent); color:#000; font-weight:700; border-radius:50%; }
.cal-day.trained.today { box-shadow:0 0 0 2px var(--accent), 0 0 0 4px var(--bg); }

/* SVG CHART */
.chart-wrap { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--r); margin-bottom:14px; padding:14px; }
.chart-title { font-size:13px; font-weight:600; color:var(--text2); margin-bottom:4px; }
.chart-latest { font-size:20px; font-weight:700; color:var(--accent); margin-bottom:10px; }
.chart-latest span { font-size:12px; color:var(--text3); font-weight:400; }
svg.linechart { width:100%; overflow:visible; }
</style>
</head>

function getWeekEx(sessionId, exIndex) {
  const w = WEEK_DATA[S.week];
  if (!w) return null;
  const map = {
    'd1': ['squat_strength','squat_hyp','ohp',null,null,null],
    'd2': ['deadlift','bench_strength','bench_hyp',null,null,null,null],
    'd3': ['squat_d3',null,null,null,null],
  };
  const keys = map[sessionId];
  if (!keys || !keys[exIndex]) return null;
  return w[keys[exIndex]] || null;
}

function calcLoad(ex, sessionId, exIndex) {
  // Try week-specific data first
  const we = sessionId ? getWeekEx(sessionId, exIndex) : null;
  const pct = we ? we[3] : ex.pct;
  const k = RM_LIFTS[ex.name];
  if (!k || !pct) return null;
  return Math.round(S.oneRMs[k] * pct / 2.5) * 2.5;
}

function getWeekReps(ex, sessionId, exIndex) {
  const we = sessionId ? getWeekEx(sessionId, exIndex) : null;
  return we ? String(we[2]) : ex.reps;
}

function getWeekSets(ex, sessionId, exIndex) {
  const we = sessionId ? getWeekEx(sessionId, exIndex) : null;
  return we ? we[1] : ex.sets;
}

function getWeekNote(ex, sessionId, exIndex) {
  const we = sessionId ? getWeekEx(sessionId, exIndex) : null;
  return we ? we[6] : ex.note;
}

          <input class="set-inp" type="number" step="0.5" inputmode="decimal" placeholder="${ex.rpe||'?'}" value="${sv.rpe||''}" oninput="setVal('${ei}','${si}','rpe',this.value,'${id}')" style="border-color:#3a2200;">

    h+=`</div></div>`;
  });
  const alreadyDone = S.logs[lk(id)] && S.logs[lk(id)].done;

function setVal(ei,si,field,val,id){
  const key=lk(id);const sk=`${ei}_${si}`;
  if(!S.logs[key].sets[sk])S.logs[key].sets[sk]={};
  S.logs[key].sets[sk][field]=val;save();
}

function toggleChk(ei,si,id){
  const key=lk(id);const sk=`${ei}_${si}`;
  if(!S.logs[key].sets[sk])S.logs[key].sets[sk]={};
  const sv=S.logs[key].sets[sk];
  sv.logged=!sv.logged;
  const el=document.getElementById(`chk_${ei}_${si}`);
  if(el)el.classList.toggle('done',sv.logged);
  if(sv.logged&&sv.kg&&sv.reps){
    const sess=SESSIONS.find(s=>s.id===id);
    const liftKey=RM_LIFTS[sess.exercises[ei].name];
    if(liftKey){
      const e1rm=Math.round(parseFloat(sv.kg)*(1+parseInt(sv.reps)/30)*10)/10;
      if(!S.history[liftKey])S.history[liftKey]=[];
      S.history[liftKey].push({date:new Date().toISOString().slice(0,10),e1rm,kg:parseFloat(sv.kg),reps:parseInt(sv.reps)});
    }
  }
  save();
}

function removeExtraSet(ei, setIndex, id) {
  const key = lk(id);
  const sets = S.logs[key].sets;
  const extraCount = sets[`${ei}_extra_count`] || 0;
  if (extraCount <= 0) return;
  // Shift set data down from removed index
  for (let si = setIndex; si < setIndex + extraCount - 1; si++) {
    sets[`${ei}_${si}`] = sets[`${ei}_${si+1}`] || {};
  }
  delete sets[`${ei}_${setIndex + extraCount - 1}`];
  sets[`${ei}_extra_count`] = extraCount - 1;
  save();
  renderSession(id);
}

function addExtraSet(ei, id) {
  const key = lk(id);
  if (!S.logs[key]) return;
  const sets = S.logs[key].sets;
  const current = sets[`${ei}_extra_count`] || 0;
  sets[`${ei}_extra_count`] = current + 1;
  save();
  renderSession(id);
}

function undoSession(id) {
  if (!confirm('Sessie markering ongedaan maken?')) return;
  const key = lk(id);
  if (S.logs[key]) S.logs[key].done = false;
  save();
  renderSession(id);
}

function completeSession(id){
  S.logs[lk(id)].done=true;
  S.logs[lk(id)].date=new Date().toISOString().slice(0,10);
  save();go('home');
}

function makeChart(data,color){
  if(!data||data.length<1)return'';
  const W=340,H=100,PAD={t:10,r:10,b:28,l:38};
  const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
  const vals=data.map(d=>d.e1rm);
  const dates=data.map(d=>d.date);
  const minV=Math.min(...vals),maxV=Math.max(...vals);
  const range=maxV-minV||1;
  const px=(v,i)=>PAD.l+i*(iW/Math.max(data.length-1,1));
  const py=v=>PAD.t+iH-(((v-minV)/range)*iH);
  const pts=data.map((d,i)=>`${px(d.e1rm,i).toFixed(1)},${py(d.e1rm).toFixed(1)}`).join(' ');
  // y axis labels
  const yStep=Math.ceil(range/3/5)*5||5;
  const yTicks=[];
  for(let v=Math.ceil(minV/yStep)*yStep;v<=maxV+0.1;v+=yStep)yTicks.push(v);
  // x axis labels: first and last
  const fmt=d=>d.slice(5).replace('-','/');
  let svg=`<svg class="linechart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // grid lines
  yTicks.forEach(v=>{
    const y=py(v).toFixed(1);
    svg+=`<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#333" stroke-width="0.5"/>`;
    svg+=`<text x="${PAD.l-4}" y="${parseFloat(y)+4}" text-anchor="end" font-size="9" fill="#666">${v}</text>`;
  });
  // x labels
  svg+=`<text x="${PAD.l}" y="${H-4}" text-anchor="middle" font-size="9" fill="#666">${fmt(dates[0])}</text>`;
  if(data.length>1)svg+=`<text x="${W-PAD.r}" y="${H-4}" text-anchor="middle" font-size="9" fill="#666">${fmt(dates[dates.length-1])}</text>`;
  // line
  svg+=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  // dots
  data.forEach((d,i)=>{
    const cx=px(d.e1rm,i).toFixed(1),cy=py(d.e1rm).toFixed(1);
    svg+=`<circle cx="${cx}" cy="${cy}" r="${i===data.length-1?4:2.5}" fill="${i===data.length-1?color:'#1a1a1a'}" stroke="${color}" stroke-width="1.5"/>`;
  });
  svg+=`</svg>`;
  return svg;
}

function getWeekVolume(weekNum) {
  // total kg moved in a week: sum of kg * reps for all logged sets
  let total = 0;
  Object.entries(S.logs).forEach(([key, log]) => {
    if (!key.includes('_w'+weekNum)) return;
    Object.values(log.sets||{}).forEach(s => {
      if (s.logged && s.kg && s.reps) total += parseFloat(s.kg) * parseInt(s.reps);
    });
  });
  return Math.round(total);
}

function getConsistency() {
  // planned sessions per week = 4 (5 on odd weeks)
  const totalPlanned = Array.from({length:10},(_,i)=>i+1).reduce((a,w)=>a+(w%2!==0?5:4),0);
  const done = Object.values(S.logs).filter(l=>l.done).length;
  const weeksTraining = Math.max(1, S.week);
  const plannedSoFar = Array.from({length:weeksTraining},(_,i)=>i+1).reduce((a,w)=>a+(w%2!==0?5:4),0);
  return Math.round((done / plannedSoFar) * 100);
}

function getBestSets() {
  // best logged set per main lift this week
  const best = {squat:null, bench:null, deadlift:null, ohp:null};
  const liftMap = {'Back Squat':'squat','Bench Press':'bench','Deadlift':'deadlift','Overhead Press':'ohp'};
  Object.entries(S.logs).forEach(([key, log]) => {
    if (!key.includes('_w'+S.week)) return;
    const sessId = key.split('_w')[0];
    const sess = SESSIONS.find(s=>s.id===sessId);
    if (!sess) return;
    Object.entries(log.sets||{}).forEach(([sk, sv]) => {
      if (!sv.logged || !sv.kg || !sv.reps) return;
      const ei = parseInt(sk.split('_')[0]);
      const ex = sess.exercises[ei];
      if (!ex) return;
      const lk = liftMap[ex.name];
      if (!lk) return;
      const vol = parseFloat(sv.kg) * parseInt(sv.reps);
      if (!best[lk] || vol > best[lk].vol) {
        best[lk] = {kg: parseFloat(sv.kg), reps: parseInt(sv.reps), vol};
      }
    });
  });
  return best;
}

function getAvgRPE() {
  // average RPE of last completed session
  const doneLogs = Object.values(S.logs).filter(l=>l.done && l.sets);
  if (!doneLogs.length) return null;
  const last = doneLogs[doneLogs.length-1];
  const rpes = Object.values(last.sets).filter(s=>s.logged && s.rpe).map(s=>parseFloat(s.rpe));
  if (!rpes.length) return null;
  return (rpes.reduce((a,b)=>a+b,0)/rpes.length).toFixed(1);
}

function getPrevWeekVolume() {
  if (S.week <= 1) return null;
  return getWeekVolume(S.week - 1);
}

let buddyData = null;

async function fetchBuddyData() {
  const otherUser = currentUser === 'ken' ? 'romen' : 'ken';
  const binKey = 'pb_bin_id_' + otherUser;
  buddyBinId = localStorage.getItem(binKey);
  if (!buddyBinId) {
    renderBuddy(null);
    return;
  }
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/' + buddyBinId + '/latest', {
      headers: {'X-Access-Key': API_KEY}
    });
    if (r.ok) {
      const j = await r.json();
      buddyData = j.record;
      renderBuddy(buddyData);
    } else {
      renderBuddy(null);
    }
  } catch(e) {
    renderBuddy(null);
  }
}

function getBuddyLastSession(data) {
  if (!data || !data.logs) return null;
  const done = Object.entries(data.logs).filter(([k,v]) => v.done && v.date);
  if (!done.length) return null;
  done.sort((a,b) => new Date(b[1].date) - new Date(a[1].date));
  const [key, log] = done[0];
  const sessId = key.split('_w')[0];
  const week = key.split('_w')[1];
  const sess = SESSIONS.find(s => s.id === sessId);
  const daysAgo = Math.round((new Date() - new Date(log.date)) / 86400000);
  const dayStr = daysAgo === 0 ? 'Vandaag' : daysAgo === 1 ? 'Gisteren' : daysAgo + ' dagen geleden';
  return { sessName: sess ? sess.name + ' · ' + sess.sub : sessId, week, dayStr, date: log.date };
}

function getBuddyWeek(data) {
  if (!data) return '—';
  return data.week || '—';
}

function makeBuddyChart(myHist, buddyHist, color1, color2) {
  const all = [...(myHist||[]), ...(buddyHist||[])];
  if (!all.length) return '';
  const W=300, H=80, PL=28, PR=8, PT=8, PB=20;
  const iW=W-PL-PR, iH=H-PT-PB;
  const allVals = all.map(d=>d.e1rm);
  const minV=Math.min(...allVals), maxV=Math.max(...allVals);
  const range=maxV-minV||1;
  const py=v=>PT+iH-(((v-minV)/range)*iH);

  const makeLine = (hist) => {
    if (!hist || hist.length < 2) return '';
    const pts = hist.map((d,i) => `${PL + i*(iW/Math.max(hist.length-1,1))},${py(d.e1rm)}`).join(' ');
    return pts;
  };

  const myPts = makeLine(myHist);
  const buddyPts = makeLine(buddyHist);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%">`;
  svg += `<line x1="${PL}" y1="${PT}" x2="${W-PR}" y2="${PT}" stroke="#2a2a2a" stroke-width="0.5"/>`;
  svg += `<line x1="${PL}" y1="${PT+iH/2}" x2="${W-PR}" y2="${PT+iH/2}" stroke="#2a2a2a" stroke-width="0.5"/>`;
  if (myPts) svg += `<polyline points="${myPts}" fill="none" stroke="${color1}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  if (buddyPts) svg += `<polyline points="${buddyPts}" fill="none" stroke="${color2}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="4,2"/>`;
  if (myHist && myHist.length) {
    const lx = PL + (myHist.length-1)*(iW/Math.max(myHist.length-1,1));
    svg += `<circle cx="${lx}" cy="${py(myHist[myHist.length-1].e1rm)}" r="3" fill="${color1}"/>`;
  }
  if (buddyHist && buddyHist.length) {
    const lx = PL + (buddyHist.length-1)*(iW/Math.max(buddyHist.length-1,1));
    svg += `<circle cx="${lx}" cy="${py(buddyHist[buddyHist.length-1].e1rm)}" r="3" fill="${color2}"/>`;
  }
  svg += `</svg>`;
  return svg;
}

      const mh = myHist[l.key] || [];
      const bh = buddyHist[l.key] || [];
      if (!mh.length && !bh.length) return;
      const myLatest = mh.length ? mh[mh.length-1].e1rm : null;
      const buddyLatest = bh.length ? bh[bh.length-1].e1rm : null;
      h += `<div class="card" style="margin-bottom:10px;padding:14px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
          <span style="font-size:13px;font-weight:600;color:var(--text2)">${l.name}</span>
          <span style="font-size:12px;color:var(--text3)">${myLatest?myLatest+'kg':'—'} vs ${buddyLatest?buddyLatest+'kg':'—'}</span>
        </div>
        ${makeBuddyChart(mh, bh, myColor, buddyColor)}
      </div>`;
    });
  }

  h += `<button onclick="fetchBuddyData()" style="display:block;width:100%;background:none;border:0.5px solid var(--border);color:var(--text2);border-radius:var(--r);padding:12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;">↻ Verversen</button>`;

  document.getElementById('screen-buddy').innerHTML = h;
}

function renderSettings(){
  document.getElementById('screen-settings').innerHTML=`
    <h1 style="margin-bottom:18px">Settings</h1>
    <div class="section-label">1RM (kg)</div>
    <div class="card">
      ${[['squat','Back Squat'],['bench','Bench Press'],['deadlift','Deadlift'],['ohp','OHP']].map(([k,n])=>
        `<div class="rm-row"><div>${n}</div>
        <input class="rm-inp" type="number" step="2.5" inputmode="decimal" value="${S.oneRMs[k]}"
          onchange="S.oneRMs['${k}']=parseFloat(this.value)||0;save()"></div>`
      ).join('')}
    </div>
    <div class="section-label">Lichaamsgewicht</div>
    <div class="card">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
        <input class="rm-inp" type="number" step="0.1" inputmode="decimal" id="bw-inp" placeholder="75.0" style="width:100px">
        <button onclick="
          const v=parseFloat(document.getElementById('bw-inp').value);
          if(!v)return;
          if(!S.bodyweight)S.bodyweight=[];
          const today=new Date().toISOString().slice(0,10);
          const last=S.bodyweight[S.bodyweight.length-1];
          if(last&&last.date===today){last.kg=v;}else{S.bodyweight.push({date:today,kg:v});}
          save();
          document.getElementById('bw-inp').value='';
          renderSettings();
        " style="flex:1;background:var(--accent);border:none;color:#000;border-radius:var(--r-sm);padding:10px;font-size:14px;font-weight:700;cursor:pointer">+ Toevoegen</button>
      </div>
      ${(S.bodyweight||[]).slice(-5).reverse().map(b=>`
        <div class="rm-row">
          <div style="color:var(--text2);font-size:13px">${b.date.slice(5).replace('-','/')}</div>
          <div style="font-weight:700">${b.kg} kg</div>
        </div>`).join('')}
      ${(S.bodyweight||[]).length===0?'<div style="color:var(--text3);font-size:13px">Nog geen metingen</div>':''}
    </div>
    ${currentUser !== 'romen' ? `<div class="section-label">Blessure</div>
    <div class="card" style="color:var(--orange);font-size:13px;line-height:1.7">
      ⚠️ Herstellende van sleutelbeenoperatie. Oefeningen met ⚠️ vereisen extra voorzichtigheid. Druk de RPE niet op drukoefeningen tot de schouder stabiel aanvoelt.
    </div>` : ''}
    <div class="section-label">Programma</div>
    <div class="card">
      <div class="rm-row"><div>Atleet</div><div style="color:var(--text2);font-size:13px">Man, 35 · ${(S.bodyweight&&S.bodyweight.length?S.bodyweight[S.bodyweight.length-1].kg:'75')} kg</div></div>
      <div class="rm-row"><div>Programma</div><div style="color:var(--text2);font-size:13px">Nippard 4×</div></div>
      <div class="rm-row"><div>Blokduur</div><div style="color:var(--text2);font-size:13px">10 weken</div></div>
      <div class="rm-row"><div>Deloadweken</div><div style="color:var(--text2);font-size:13px">5 &amp; 10</div></div>
    </div>
    <div class="section-label">Account</div>
    <div class="card">
      <div class="rm-row">
        <div><div style="font-weight:600">${USERS[currentUser]?.display||'Gebruiker'}</div><div style="font-size:12px;color:var(--text2)">${currentUser}</div></div>
        <button onclick="sessionStorage.removeItem('gym_user');logout();" style="background:var(--bg4);border:0.5px solid var(--border);color:var(--red);border-radius:var(--r-sm);padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600">Uitloggen</button>
      </div>
    </div>
    <div class="section-label">Data</div>
    <div class="card">
      <div class="rm-row"><div>Alle logs wissen</div>
        <button onclick="if(confirm('Logs wissen? 1RMs blijven.')){S.logs={};S.history={};save();alert('Klaar.');}"
          style="background:var(--bg4);border:0.5px solid var(--border);color:var(--red);border-radius:var(--r-sm);padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600">Reset</button>
      </div>
    </div>`;
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
const USERS = {
  ken:   { password: 'gym',  binKey: 'pb2',       display: 'Ken' },
  romen: { password: 'gym',  binKey: 'pb2_romen',  display: 'Romen' },
};
const BIN_IDS = {
  ken:   '$2a$10$i7SkHs8gp0kNwollzfvVf.3CPLzPYTGDuxYX5TesScFNvTpJD5OU2',
  romen: '$2a$10$i7SkHs8gp0kNwollzfvVf.3CPLzPYTGDuxYX5TesScFNvTpJD5OU2',
};

let currentUser = null;
let selectedUser = null;

function doLogin(u) {
  if (u) selectedUser = u;
  const user = USERS[selectedUser];
  if (!user) return;
  currentUser = selectedUser;
  sessionStorage.setItem('gym_user', currentUser);
  // Switch localStorage key per user
  const storageKey = user.binKey;
  // Override load/save to use user-specific key
  window._storageKey = storageKey;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('main-nav').style.display = 'flex';
  // Remove injury note for romen
  if (currentUser === 'romen') {
    S.showInjury = false;
  } else {
    S.showInjury = true;
  }
  load();
  renderHome();
  initCloud();
  // Show username in settings
  document.title = 'Nippard 4× — ' + user.display;
}

function logout() {
  currentUser = null;
  selectedUser = null;
  S = {week:1,oneRMs:{squat:90,bench:75,deadlift:130,ohp:40},logs:{},history:{},activeId:null,calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),bodyweight:[{date:new Date().toISOString().slice(0,10),kg:75}]};
  document.getElementById('login-pw') && (document.getElementById('login-pw').value = '');
  document.getElementById('login-step-1').style.display = 'block';
  document.getElementById('login-step-2').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('main-nav').style.display = 'none';
}

// Override load/save to be user-aware
const _origLoad = load;
const _origSave = save;

function load() {
  const key = window._storageKey || 'pb2';
  try { const d = localStorage.getItem(key); if(d) Object.assign(S, JSON.parse(d)); } catch(e) {}
}
function save() {
  const key = window._storageKey || 'pb2';
  try { localStorage.setItem(key, JSON.stringify(S)); } catch(e) {}
  clearTimeout(saveTimer);
  saveTimer = setTimeout(cloudSave, 1500);
  showSyncStatus('↑ Bezig...');
}

// Check if already logged in this session
const sessionUser = sessionStorage.getItem('gym_user');
if (sessionUser && USERS[sessionUser]) {
  selectUser(sessionUser);
  doLogin();
} else {
  // just show login, don't auto-init
}initCloud();
</script>
